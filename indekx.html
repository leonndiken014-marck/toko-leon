<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Keamanan - Toko Leon</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 90%; max-width: 320px; text-align: center; border: 1px solid #38bdf8; }
        h2 { color: #38bdf8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { margin-top: 15px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛡️ SECURITY LOGIN</h2>
    <p style="font-size: 12px; color: #94a3b8;">Sistem Keamanan V5 - Toko Leon</p>
    
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="cekLogin()">MASUK KE TOKO</button>
    
    <div id="status">Silahkan Login</div>
</div>

<script>
    // Username: LEON | Password: 123
    function cekLogin() {
        let u = document.getElementById("user").value.toUpperCase();
        let p = document.getElementById("pass").value;
        let s = document.getElementById("status");

        if (u === "LEON" && p === "123") {
            s.innerHTML = "✅ BERHASIL! Membuka Toko...";
            s.style.color = "#4ade80";
            
            // INI BAGIAN PENTING: Mengarahkan ke file toko kamu
            setTimeout(() => {
                window.location.href = "indeks.html";
            }, 1500);
            
        } else {
            s.innerHTML = "❌ Akses Ditolak! Data Salah.";
            s.style.color = "#f43f5e";
        }
    }
</script>

</body>
</html>
