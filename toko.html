<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Aman V6 - Dashboard Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --accent: #f43f5e; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        
        /* Header & Nav */
        header { background: var(--card); padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); sticky: top; }
        .nav-tabs { display: flex; justify-content: center; gap: 10px; margin: 20px 0; overflow-x: auto; padding: 10px; }
        .tab-btn { background: #334155; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: var(--bg); font-weight: bold; }

        .container { max-width: 800px; margin: auto; padding: 15px; }

        /* Product Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid #334155; position: relative; }
        .item-card h3 { font-size: 14px; margin: 10px 0; }
        .price { color: var(--primary); font-weight: bold; font-size: 16px; }
        .add-btn { width: 100%; margin-top: 10px; background: var(--primary); border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Floating Cart Bar */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); padding: 15px; border-top: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); z-index: 100; }
        .btn-checkout { background: #4ade80; color: #064e3b; padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold; }

        /* Order Modal */
        #orderModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <h2>🛡️ TOKO AMAN V6</h2>
    <p style="font-size: 12px; color: #94a3b8;">Layanan Digital Terpercaya by Leon</p>
</header>

<div class="nav-tabs">
    <button class="tab-btn active">Semua</button>
    <button class="tab-btn">Game</button>
    <button class="tab-btn">Aplikasi</button>
    <button class="tab-btn">Joki</button>
</div>

<div class="container">
    <div class="grid" id="productGrid">
        <!-- Produk diisi via JS -->
    </div>
</div>

<div class="cart-bar" id="cartBar" style="display: none;">
    <div>
        <span id="cartCount">0 Items</span><br>
        <span class="price" id="cartTotal">Rp 0</span>
    </div>
    <button class="btn-checkout" onclick="openOrder()">BAYAR SEKARANG</button>
</div>

<!-- Modal Form Order -->
<div id="orderModal">
    <div class="modal-content">
        <h3>📝 Form Konfirmasi</h3>
        <input type="text" id="orderID" placeholder="User ID Game / Email Akun">
        <input type="text" id="orderServer" placeholder="Server ID (Kosongkan jika tdk ada)">
        <input type="number" id="orderWA" placeholder="Nomor WhatsApp (Aktif)">
        <p style="font-size: 11px; color: #94a3b8;">*Pastikan data benar sebelum bayar.</p>
        <button class="btn-checkout" style="width: 100%;" onclick="sendWA()">KIRIM KE WHATSAPP</button>
        <button onclick="document.getElementById('orderModal').style.display='none'" style="background:transparent; color:white; border:none; width:100%; margin-top:10px;">Batal</button>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: "86 Diamonds ML", price: 19500, cat: "Game" },
        { id: 2, name: "172 Diamonds ML", price: 38000, cat: "Game" },
        { id: 3, name: "Spotify Premium 1 Bln", price: 15000, cat: "Aplikasi" },
        { id: 4, name: "Netflix UHD 1 Profile", price: 35000, cat: "Aplikasi" },
        { id: 5, name: "Joki Rank Epic-Legend", price: 50000, cat: "Joki" }
    ];

    let cart = [];

    function renderProducts() {
        const grid = document.getElementById('productGrid');
        grid.innerHTML = products.map(p => `
            <div class="item-card">
                <span style="font-size:10px; color:#38bdf8">${p.cat}</span>
                <h3>${p.name}</h3>
                <span class="price">Rp ${p.price.toLocaleString()}</span>
                <button class="add-btn" onclick="addToCart(${p.id})">+ Tambah</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const item = products.find(p => p.id === id);
        cart.push(item);
        updateCart();
    }

    function updateCart() {
        const bar = document.getElementById('cartBar');
        const count = document.getElementById('cartCount');
        const total = document.getElementById('cartTotal');
        
        if(cart.length > 0) bar.style.display = 'flex';
        
        let sum = cart.reduce((a, b) => a + b.price, 0);
        count.innerText = cart.length + " Items";
        total.innerText = "Total: Rp " + sum.toLocaleString();
    }

    function openOrder() {
        document.getElementById('orderModal').style.display = 'flex';
    }

    function sendWA() {
        const idGame = document.getElementById('orderID').value;
        const server = document.getElementById('orderServer').value;
        const wa = document.getElementById('orderWA').value;
        
        if(!idGame || !wa) return alert("Isi data dulu bro!");

        let nomorAdmin = "628xxxxxxxxxx"; // GANTI NOMOR WA KAMU
        let totalSum = cart.reduce((a, b) => a + b.price, 0);
        let listItems = cart.map(c => c.name).join(", ");

        let pesan = `*ORDER BARU - TOKO LEON*\n------------------\n`;
        pesan += `📦 Barang: ${listItems}\n`;
        pesan += `👤 ID: ${idGame} (${server})\n`;
        pesan += `📱 WA: ${wa}\n`;
        pesan += `💰 *Total: Rp ${totalSum.toLocaleString()}*\n------------------\n`;
        pesan += `Mohon segera diproses ya Leon!`;

        window.open(`https://wa.me/${nomorAdmin}?text=${encodeURIComponent(pesan)}`);
    }

    renderProducts();
</script>

</body>
</html>
