<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Toko Leon</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        /* GRID PRODUK */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .product-card {
            background: var(--card);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #334155;
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .product-img {
            width: 100%;
            height: 120px;
            background: #334155;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .price {
            color: var(--primary);
            font-weight: bold;
            display: block;
            margin: 10px 0;
        }

        .btn-buy {
            background: var(--primary);
            color: var(--bg);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* KERANJANG */
        .cart-section {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 10px;
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
        }

        .total-box {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
            text-align: right;
        }

        .btn-checkout {
            background: #4ade80;
            color: #064e3b;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>🛒 TOKO AMAN LEON</h1>
    <p>Selamat Datang, Admin!</p>
</header>

<div class="container">
    <!-- Bagian Produk -->
    <div class="product-grid">
        <!-- Produk 1 -->
        <div class="product-card">
            <div class="product-img">💎</div>
            <h3>100 Diamonds</h3>
            <span class="price">Rp 20.000</span>
            <button class="btn-buy" onclick="tambahKeKeranjang('100 Diamonds', 20000)">Tambah</button>
        </div>

        <!-- Produk 2 -->
        <div class="product-card">
            <div class="product-img">🎮</div>
            <h3>Akun Premium</h3>
            <span class="price">Rp 50.000</span>
            <button class="btn-buy" onclick="tambahKeKeranjang('Akun Premium', 50000)">Tambah</button>
        </div>

        <!-- Produk 3 -->
        <div class="product-card">
            <div class="product-img">🛡️</div>
            <h3>Lisensi V5</h3>
            <span class="price">Rp 150.000</span>
            <button class="btn-buy" onclick="tambahKeKeranjang('Lisensi V5', 150000)">Tambah</button>
        </div>

        <!-- Produk 4 -->
        <div class="product-card">
            <div class="product-img">⚡</div>
            <h3>Booster Speed</h3>
            <span class="price">Rp 15.000</span>
            <button class="btn-buy" onclick="tambahKeKeranjang('Booster Speed', 15000)">Tambah</button>
        </div>
    </div>

    <!-- Bagian Keranjang -->
    <div class="cart-section">
        <h3>📦 Keranjang Belanja</h3>
        <div id="cartItems">
            <p style="color: #64748b; font-size: 13px;">Belum ada barang...</p>
        </div>
        <div class="total-box">
            Total: Rp <span id="totalHarga">0</span>
        </div>
        <button class="btn-checkout" onclick="checkout()">BAYAR SEKARANG</button>
    </div>
</div>

<script>
    let keranjang = [];
    let total = 0;

    function tambahKeKeranjang(nama, harga) {
        keranjang.push({nama, harga});
        total += harga;
        updateTampilanKeranjang();
    }

    function updateTampilanKeranjang() {
        const listElement = document.getElementById("cartItems");
        const totalElement = document.getElementById("totalHarga");
        
        listElement.innerHTML = ""; // Kosongkan dulu

        keranjang.forEach((item, index) => {
            const div = document.createElement("div");
            div.className = "cart-item";
            div.innerHTML = `
                <span>${item.nama}</span>
                <span>Rp ${item.harga.toLocaleString()}</span>
            `;
            listElement.appendChild(div);
        });

        totalElement.innerText = total.toLocaleString();
    }

    function checkout() {
        if (keranjang.length === 0) {
            alert("Keranjang masih kosong!");
            return;
        }
        alert("Terima kasih! Pesanan Anda senilai Rp " + total.toLocaleString() + " sedang diproses.");
        // Reset keranjang
        keranjang = [];
        total = 0;
        updateTampilanKeranjang();
    }
</script>

</body>
</html>
