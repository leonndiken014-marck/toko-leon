<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Toko Leon</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 85%; max-width: 300px; text-align: center; border: 1px solid #38bdf8; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #0f172a; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛡️ LOGIN ADMIN</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="masuk()">MASUK KE TOKO</button>
        <div id="msg" style="margin-top:15px; font-size:13px">Silahkan Login</div>
    </div>
    <script>
        function masuk() {
            let u = document.getElementById("user").value.toUpperCase();
            let p = document.getElementById("pass").value;
            if (u === "LEON" && p === "123") {
                window.location.href = "toko.html"; 
            } else {
                document.getElementById("msg").innerHTML = "❌ Data Salah!";
                document.getElementById("msg").style.color = "#f43f5e";
            }
        }
    </script>
</body>
</html>
